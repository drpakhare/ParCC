<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181.65 209.72" width="181.65" height="209.72">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4F72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E2F44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48C9B0;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#48C9B0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#48C9B0;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hex shape -->
  <polygon
    points="90.83,1 180.65,53.43 180.65,156.29 90.83,208.72 1,156.29 1,53.43"
    fill="url(#bgGrad)"
    stroke="#48C9B0"
    stroke-width="3"
  />

  <!-- Subtle grid lines (representing model structure) -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="25" y1="70" x2="156" y2="70" />
    <line x1="25" y1="95" x2="156" y2="95" />
    <line x1="25" y1="120" x2="156" y2="120" />
    <line x1="25" y1="145" x2="156" y2="145" />
    <line x1="50" y1="55" x2="50" y2="160" />
    <line x1="90" y1="55" x2="90" y2="160" />
    <line x1="130" y1="55" x2="130" y2="160" />
  </g>

  <!-- Survival/distribution curve (S-curve, represents the core function) -->
  <path
    d="M 35,135 C 50,135 55,133 65,125 C 75,117 80,105 90,95 C 100,85 110,78 120,75 C 130,72 140,71 148,71"
    fill="none"
    stroke="url(#curveGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.7"
  />

  <!-- Conversion arrows (the core concept - parameter transformation) -->
  <!-- Left arrow cluster -->
  <g transform="translate(58, 98)" opacity="0.85">
    <!-- Arrow 1: rate to probability -->
    <line x1="0" y1="0" x2="22" y2="-12" stroke="url(#arrowGrad)" stroke-width="2" stroke-linecap="round" />
    <polygon points="22,-12 16,-8 18,-14" fill="#E74C3C" />
    <!-- Arrow 2: reverse -->
    <line x1="22" y1="2" x2="0" y2="14" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <polygon points="0,14 6,10 4,16" fill="#F39C12" opacity="0.5" />
  </g>

  <!-- Right arrow cluster -->
  <g transform="translate(98, 88)" opacity="0.85">
    <line x1="0" y1="0" x2="22" y2="-10" stroke="url(#arrowGrad)" stroke-width="2" stroke-linecap="round" />
    <polygon points="22,-10 16,-6 18,-12" fill="#E74C3C" />
    <line x1="22" y1="4" x2="0" y2="14" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <polygon points="0,14 6,10 4,16" fill="#F39C12" opacity="0.5" />
  </g>

  <!-- Small dots on curve (data points / KM estimates) -->
  <circle cx="50" cy="133" r="2.5" fill="#48C9B0" opacity="0.8" />
  <circle cx="75" cy="117" r="2.5" fill="#48C9B0" opacity="0.8" />
  <circle cx="105" cy="82" r="2.5" fill="#48C9B0" opacity="0.8" />
  <circle cx="140" cy="72" r="2.5" fill="#48C9B0" opacity="0.8" />

  <!-- Main title: ParCC -->
  <text x="90.83" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" letter-spacing="2">
    ParCC
  </text>

  <!-- Subtitle line 1 -->
  <text x="90.83" y="165" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#A3D5C9" letter-spacing="0.5">
    Parameter Converter
  </text>

  <!-- Subtitle line 2 -->
  <text x="90.83" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#A3D5C9" letter-spacing="0.5">
    &amp; Calculator for HTA
  </text>

  <!-- Small formula hint: p = 1 - e^(-rt) -->
  <text x="90.83" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#48C9B0" opacity="0.5">
    p = 1 - e^(-rt)
  </text>
</svg>
